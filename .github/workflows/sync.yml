name: Sync VNUA Schedule
on:
  schedule:
    - cron: '0 1 * * 1'   # Thứ 2 mỗi tuần, 8:00 SA (UTC+7)
  workflow_dispatch:        # Trigger thủ công
    inputs:
      hoc_ky_id:
        description: 'Mã học kỳ (để trống = học kỳ hiện tại). Ví dụ: 20261, 20253'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests icalendar

      - name: Run scraper
        env:
          SCHOOL_USER: ${{ secrets.SCHOOL_USER }}
          SCHOOL_PASS: ${{ secrets.SCHOOL_PASS }}
          HOC_KY_ID: ${{ github.event.inputs.hoc_ky_id }}
        run: python scraper.py

      - name: Commit & push .ics
        run: |
          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          git add docs/schedule.ics docs/exams.ics
          git diff --cached --quiet && echo "No changes" || git commit -m "🔄 Update schedule $(date '+%Y-%m-%d')"
          git push
